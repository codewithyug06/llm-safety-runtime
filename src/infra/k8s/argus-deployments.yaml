---
# ARGUS Kubernetes Manifests
# ============================
# All core deployments, services, and HPA configs for ARGUS on GKE.
# Apply with: kubectl apply -f src/infra/k8s/argus-deployments.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: argus-production
  labels:
    app.kubernetes.io/name: argus
    environment: production

---
# ── Safety Critic Deployment (GPU) ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-safety-critic
  namespace: argus-production
  labels:
    app: argus-safety-critic
    component: safety-critic
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argus-safety-critic
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: argus-safety-critic
        component: safety-critic
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: present
          effect: NoSchedule
      containers:
        - name: safety-critic
          image: gcr.io/argus-project/argus:latest
          command: ["uvicorn", "src.safety_critic.server:app",
                    "--host", "0.0.0.0", "--port", "8001", "--workers", "1"]
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: mlflow-tracking-uri
          resources:
            requests:
              memory: "8Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: argus-safety-critic
  namespace: argus-production
spec:
  selector:
    app: argus-safety-critic
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  type: ClusterIP

---
# ── LatentSentinel Deployment (CPU) ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-sentinel
  namespace: argus-production
  labels:
    app: argus-sentinel
    component: latent-sentinel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: argus-sentinel
  template:
    metadata:
      labels:
        app: argus-sentinel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: sentinel
          image: gcr.io/argus-project/argus:latest
          command: ["python", "-m", "src.latent_sentinel.sentinel"]
          ports:
            - containerPort: 8000
              name: metrics
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: kafka-bootstrap-servers
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: redis-url
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"

---
# ── ARGUS API Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-api
  namespace: argus-production
  labels:
    app: argus-api
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: argus-api
  template:
    metadata:
      labels:
        app: argus-api
    spec:
      containers:
        - name: api
          image: gcr.io/argus-project/argus:latest
          command: ["uvicorn", "src.api.main:app",
                    "--host", "0.0.0.0", "--port", "8080", "--workers", "2"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ARGUS_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: api-keys
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: argus-api
  namespace: argus-production
spec:
  selector:
    app: argus-api
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: LoadBalancer

---
# ── PredictiveOracle Deployment ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-oracle
  namespace: argus-production
  labels:
    app: argus-oracle
    component: predictive-oracle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argus-oracle
  template:
    metadata:
      labels:
        app: argus-oracle
    spec:
      containers:
        - name: oracle
          image: gcr.io/argus-project/argus:latest
          command: ["python", "-m", "src.predictive_oracle.telemetry_consumer"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: kafka-bootstrap-servers
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: model-artifacts
              mountPath: /models
      volumes:
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: argus-model-pvc

---
# ── Autonomous Remediator Deployment ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-remediator
  namespace: argus-production
  labels:
    app: argus-remediator
    component: autonomous-remediator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argus-remediator
  template:
    metadata:
      labels:
        app: argus-remediator
    spec:
      containers:
        - name: remediator
          image: gcr.io/argus-project/argus:latest
          command: ["python", "-m", "src.autonomous_remediator.remediator"]
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: anthropic-api-key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: redis-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: kafka-bootstrap-servers
            - name: SPANNER_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: spanner-instance-id
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"

---
# ── HPA for API tier ─────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argus-api-hpa
  namespace: argus-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argus-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

---
# ── Persistent Volume Claim for model artifacts ───────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: argus-model-pvc
  namespace: argus-production
spec:
  accessModes: [ReadOnlyMany]
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard-rwx
