##############################################################################
# ARGUS AI Safety OS — Local Development Stack
#
# Default (infra only):
#   docker compose up -d
#   Starts: zookeeper, kafka, redis, prometheus, grafana, mlflow
#
# Full stack including the ARGUS API:
#   docker compose --profile app up -d
#
# Tear down and remove volumes:
#   docker compose down -v
##############################################################################

version: "3.9"

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  argus-net:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  zookeeper-data:
  kafka-data:
  redis-data:
  prometheus-data:
  grafana-data:
  mlflow-data:

services:

  # ── Zookeeper (required by Kafka) ──────────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.8
    container_name: argus-zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    volumes:
      - zookeeper-data:/bitnami/zookeeper
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Kafka message broker ────────────────────────────────────────────────────
  # Topics auto-created on first publish; pre-created here for determinism.
  #   argus.safety.signals   — raw safety scores from LatentSentinel / OmniSafetyCritic
  #   argus.telemetry        — system metrics consumed by PredictiveOracle
  #   argus.remediation      — remediation decisions from AutonomousRemediator
  kafka:
    image: bitnami/kafka:3.5
    container_name: argus-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"          # Host access for local scripts / unit tests
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      # Pre-create ARGUS topics at startup
      KAFKA_CREATE_TOPICS: >
        argus.safety.signals:3:1,
        argus.telemetry:3:1,
        argus.remediation:3:1
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - argus-net
    healthcheck:
      test:
        - "CMD-SHELL"
        - "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Redis (agent quarantine state + rate-limit counters) ────────────────────
  # appendonly yes ensures quarantine flags survive container restarts.
  redis:
    image: redis:7-alpine
    container_name: argus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - argus-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Prometheus metrics scraper ──────────────────────────────────────────────
  # Scrapes the ARGUS API (/metrics) and its sub-services.
  # Config file: src/infra/prometheus/prometheus.yml (mounted read-only).
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: argus-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"         # Enables /-/reload for hot config reload
    volumes:
      - ./src/infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy | grep -q Healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Grafana dashboards ──────────────────────────────────────────────────────
  # Anonymous access enabled so local developers can open dashboards without login.
  # ARGUS dashboard JSON provisioned from src/infra/grafana/argus_dashboard.json.
  grafana:
    image: grafana/grafana:10.0.0
    container_name: argus-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "argus"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/argus_dashboard.json"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./src/infra/grafana/argus_dashboard.json:/var/lib/grafana/dashboards/argus_dashboard.json:ro
      - ./src/infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MLflow tracking server ──────────────────────────────────────────────────
  # Backed by SQLite at /mlflow/mlruns (swap to Postgres for multi-user prod).
  # Model registry used by MLflowRollbackClient in AutonomousRemediator.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.0
    container_name: argus-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlruns.db
        --default-artifact-root /mlflow/artifacts
        --serve-artifacts
    volumes:
      - mlflow-data:/mlflow
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── ARGUS API (app profile — not started by default) ───────────────────────
  # Start with: docker compose --profile app up -d
  # Requires a valid .env file in the project root.
  argus-api:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: argus-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      REDIS_URL: "redis://redis:6379/0"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - argus-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
