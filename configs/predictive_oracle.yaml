# ARGUS — PredictiveOracle Configuration
# ========================================
# Load via: from src.config import load_oracle_config

model:
  hidden_dim: 128
  num_heads: 8
  num_layers: 3
  patch_len: 12         # Timesteps per patch (PatchTST)
  stride: 6             # Patch stride — 50% overlap
  seq_len: 60           # 60-second rolling telemetry window (1 sample/sec)
  num_features: 9       # See TELEMETRY_FEATURES in oracle.py
  dropout: 0.1
  forecast_horizons: [30, 60, 90]   # Seconds ahead to predict

training:
  output_dir: "models/oracle"
  num_epochs: 50
  batch_size: 64
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  early_stopping_patience: 5
  val_split: 0.15
  test_split: 0.10

conformal:
  calibration_alpha: 0.1    # 90% coverage prediction intervals
  min_calibration_samples: 200

serving_latency_budget_ms: 80.0

mlflow_experiment: "argus/predictive_oracle"

alert_threshold: 0.65     # Failure probability above which to trigger remediation

kafka_telemetry_topic: "argus.telemetry"
kafka_predictions_topic: "argus.risk.predictions"
